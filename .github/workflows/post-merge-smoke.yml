name: Post-merge Smoke

# Vérifie que la prod répond après un merge sur main (Vercel auto-deploy).
# Un échec ici est repris en priorité par l'étape « reprise » du daily standup.
#
# Stratégie : poll toutes les routes en parallèle à chaque tentative (pas séquentiel),
# fenêtre ~15 min — couvre build Vercel + cold start des pages DB-dependent.

on:
  push:
    branches: [main]

concurrency:
  group: smoke-${{ github.sha }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke prod
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PROD_URL: https://open-hemicycle.vercel.app
      ROUTES: "/ /deputes /scrutins /themes"
      MAX_ATTEMPTS: 40
      WAIT_SECONDS: 20
    steps:
      - name: Attendre que toutes les routes répondent 200
        run: |
          echo "Commit déployé : ${{ github.sha }}"
          echo "Fenêtre max : ${MAX_ATTEMPTS} × ${WAIT_SECONDS}s (~$((MAX_ATTEMPTS * WAIT_SECONDS / 60)) min)"
          echo ""

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            all_ok=true
            echo "--- Tentative ${attempt}/${MAX_ATTEMPTS} ---"

            for route in $ROUTES; do
              URL="${PROD_URL}${route}"
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 30 "$URL" || echo "000")
              echo "  ${route} → HTTP ${STATUS}"
              if [ "$STATUS" != "200" ]; then
                all_ok=false
              fi
            done

            if [ "$all_ok" = "true" ]; then
              echo ""
              echo "Toutes les routes clés répondent 200."
              exit 0
            fi

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              sleep "$WAIT_SECONDS"
            fi
          done

          echo "::error::Une ou plusieurs routes n'ont pas répondu 200 après ${MAX_ATTEMPTS} tentatives."
          exit 1

      - name: Résumé
        if: always()
        run: |
          {
            echo "## Smoke prod — commit \`${{ github.sha }}\`"
            echo ""
            echo "Routes vérifiées : \`/\`, \`/deputes\`, \`/scrutins\`, \`/themes\`"
            echo ""
            echo "URL : ${PROD_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
